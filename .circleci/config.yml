# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

executors:
  arm64:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: false
    resource_class: arm.large
  amd64:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: false
    resource_class: large

# Shared anchor
#   environment:
#      <<: *common_env
references:
  common_env: &common_env
    TZ: "Asia/Tokyo"
    DOCKERHUB_IMAGENAME: "yakumosaki/glitch-soc"

commands:
  # Define reusable commands here.
  # See: https://circleci.com/docs/reference/reusing-config/
  build-and-push-image:
    steps:
      - run:
          name: "determin tag names"
          command: |
            echo 'export DOCKER_TAG="`date '+%Y%m%d'`${DOCKER_TAG_SUFFIX}"' >> "$BASH_ENV"
            echo 'export DOCKER_TAG_LATEST="latest${DOCKER_TAG_SUFFIX}"' >> "$BASH_ENV"
      - run:
          name: "Run pull.sh"
          command: bash ./pull.sh
      - run:
          name: "Run prepare.sh"
          command: |
            bash ./prepare.sh $DOCKERHUB_IMAGENAME $DOCKER_TAG
            GIT_COMMIT=`git rev-parse --short HEAD`
            # version string shown in Mastodon UI, etc.
            DISP_VER="`date '+%m%d'_${GIT_COMMIT:0:7}`"
            echo "export CUSTOM_IMG='$DISP_VER'" >> "$BASH_ENV"
      - run:
          name: "Build"
          command: |
            ARCH=`uname -m`
            docker buildx build --platform ${DOCKER_PLATFORM} \
                                --provenance=false --sbom=false \
                                --build-arg CUSTOM_IMG=${CUSTOM_IMG} \
                                -t $DOCKERHUB_IMAGENAME:${DOCKER_TAG} .
            docker tag ${DOCKERHUB_IMAGENAME}:${DOCKER_TAG} ${DOCKERHUB_IMAGENAME}:${DOCKER_TAG_LATEST}
      - run:
          name: "Push"
          command: |
            docker login -u ${DOCKER_USER} -p ${DOCKER_PASS}
            docker push $DOCKERHUB_IMAGENAME:$DOCKER_TAG
            docker push $DOCKERHUB_IMAGENAME:${DOCKER_TAG_LATEST}


# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build-image-arm64:
    executor: arm64
    environment:
      <<: *common_env
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - run:
          name: "Config"
          command: |
            # configs
            echo 'export DOCKER_TAG_SUFFIX="_arm64"' >> "$BASH_ENV"
            echo 'export DOCKER_PLATFORM="linux/arm64"' >> "$BASH_ENV"
      - checkout
      - build-and-push-image
  build-image-amd64:
    executor: amd64
    environment:
      <<: *common_env
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps
    steps:
      - run:
          name: "Config"
          command: |
            # configs
            echo 'export DOCKER_TAG_SUFFIX="_amd64"' >> "$BASH_ENV"
            echo 'export DOCKER_PLATFORM="linux/amd64"' >> "$BASH_ENV"
      - checkout
      - build-and-push-image

  push-latest-tag:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: false
    resource_class: medium

    environment:
      <<: *common_env
    steps:
      - run:
          name: "push latest manifest"
          command: |
            export IMG="${DOCKERHUB_IMAGENAME}"

            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin docker.io
            echo "Docker login ok"

            docker manifest create ${IMG}:latest \
                                   ${IMG}:latest_arm64 \
                                   ${IMG}:latest_amd64
            docker manifest push ${IMG}:latest

# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  build-and-push-glitch-soc:
    jobs:
      - build-image-arm64:
          context: DOCKER_USER
      - build-image-amd64:
          context: DOCKER_USER
      - push-latest-tag:
          requires:
            - build-image-arm64
            - build-image-amd64
          context: DOCKER_USER
